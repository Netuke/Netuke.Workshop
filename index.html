<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=5.0,user-scalable=yes"/>
<meta name="theme-color" content="#060000"/>
<title>Netuke.Workshop</title>
<meta id="meta-desc" name="description" content="Netuke.Workshop"/>
<meta id="meta-og-title" property="og:title" content="Netuke.Workshop"/>
<meta id="meta-og-desc" property="og:description" content="Netuke.Workshop"/>
<meta property="og:type" content="website"/>
<link rel="icon" href="WebsiteIcon.png"/>
<link rel="apple-touch-icon" href="WebsiteIcon.png"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" media="print" onload="this.media='all'"/>
<noscript><link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/></noscript>
<style>:root{
  --bg0:#060000;--bg1:#0d0000;--bg2:#140000;
  --g1:#cc0000;--g2:#ff2200;--g3:#ff6600;--g4:#880000;--g5:#ff9900;
  --cw:#fff0f0;--cm:#c9a0a0;--cd:#7a5050;--muted:#8a6060;
  --glass:rgba(255,40,40,.045);--glass2:rgba(255,40,40,.09);
  --surface2:rgba(255,40,40,.06);
  --border:rgba(255,80,80,.12);--border2:rgba(255,80,80,.22);
  --r:16px;--r2:24px;
  --font-d:'Syne',sans-serif;--font-b:'Outfit',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{font-family:var(--font-b);background:var(--bg0);color:var(--cw);min-height:100vh;overflow-x:hidden;-webkit-tap-highlight-color:transparent;touch-action:pan-y}
body,body *{-webkit-user-select:none;user-select:none;-webkit-touch-callout:none}
input,textarea{-webkit-user-select:text!important;user-select:text!important}
button,a,[onclick]{touch-action:manipulation;cursor:pointer}

#nw-bg{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 80% 60% at 10% 10%,rgba(180,0,0,.35),transparent 60%),
  radial-gradient(ellipse 60% 50% at 90% 20%,rgba(255,40,0,.22),transparent 55%),
  radial-gradient(ellipse 70% 60% at 50% 90%,rgba(140,0,0,.20),transparent 60%),
  radial-gradient(ellipse 50% 40% at 80% 80%,rgba(255,80,0,.15),transparent 55%),var(--bg0);
  animation:bgPulse 8s ease-in-out infinite alternate}
@keyframes bgPulse{0%{opacity:.8}100%{opacity:1}}
#nw-grid{position:fixed;inset:0;z-index:1;pointer-events:none;
  background-image:radial-gradient(circle,rgba(255,80,80,.05) 1px,transparent 1px);background-size:36px 36px}
#nw-canvas{position:fixed;inset:0;z-index:2;pointer-events:none}
#nw-glow{position:fixed;z-index:3;pointer-events:none;width:500px;height:500px;border-radius:50%;
  background:radial-gradient(circle,rgba(204,0,0,.15),rgba(255,80,0,.07) 40%,transparent 70%);
  transform:translate(-50%,-50%);opacity:0;transition:left .08s,top .08s}

.wrapper{position:relative;z-index:10;max-width:1160px;margin:0 auto;padding:0 24px}

nav{position:sticky;top:0;z-index:200;background:rgba(6,0,0,.92);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
nav::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,#300000,#880000,#cc0000,#ff2200,#ff6600,#ffaa00,#ff6600,#ff2200,#cc0000,#880000,#300000);
  background-size:300% 100%;animation:fireFlow 2s linear infinite}
@keyframes fireFlow{from{background-position:0% 0}to{background-position:200% 0}}

.nav-row1{display:flex;align-items:center;padding:0 16px;height:58px;gap:10px;max-width:1160px;margin:0 auto}

.logo{
  font-family:var(--font-d);font-size:1.35rem;font-weight:800;letter-spacing:-.5px;
  background:linear-gradient(90deg,#ff0000,#ff4400,#ffaa00,#ff4400,#cc0000,#770000,#cc0000,#ff4400,#ffaa00,#ff0000);
  background-size:300% 100%;-webkit-background-clip:text;background-clip:text;
  -webkit-text-fill-color:transparent;cursor:pointer;
  animation:logoFire 2.5s linear infinite,logoGlow 2s ease-in-out infinite alternate;
  flex-shrink:1;text-decoration:none;white-space:nowrap
}
.logo span{color:inherit;-webkit-text-fill-color:inherit}
@keyframes logoFire{0%{background-position:0% 50%}100%{background-position:300% 50%}}
@keyframes logoGlow{
  0%{filter:drop-shadow(0 0 8px rgba(200,0,0,.6)) drop-shadow(0 0 3px rgba(255,80,0,.4))}
  100%{filter:drop-shadow(0 0 22px rgba(230,0,0,.95)) drop-shadow(0 0 9px rgba(255,130,0,.75))}
}

.nav-search{display:flex;align-items:center;flex:1 1 0px;min-width:0;
  background:rgba(255,255,255,.07);border:1px solid var(--border2);
  border-radius:var(--r);overflow:hidden;transition:border-color .25s,box-shadow .25s}
.nav-search:focus-within{border-color:rgba(255,80,0,.5);box-shadow:0 0 0 3px rgba(204,0,0,.12)}
.nav-search.typing{border-color:rgba(255,40,0,.5)}
.nav-search input{flex:1 1 0px;width:0;min-width:0;background:transparent;border:none;outline:none;
  color:var(--cw);font-family:var(--font-b);font-size:16px;padding:10px 12px;
  -webkit-appearance:none;appearance:none}
.nav-search input::placeholder{color:var(--muted)}
.nav-search button{background:transparent;border:none;color:var(--cd);padding:10px 10px;
  display:flex;align-items:center;justify-content:center;min-width:40px;min-height:44px;flex-shrink:0;transition:color .2s}
.nav-search button:hover,.nav-search button:active{color:var(--g3)}
.clear-search{font-size:.95rem;display:none}
.nav-search.has-text .clear-search{display:flex}

.lang-wrap{position:relative;flex-shrink:0}
.btn-translate{display:inline-flex;align-items:center;justify-content:center;
  background:var(--glass);border:1px solid var(--border2);color:var(--cm);
  font-family:var(--font-b);font-size:.83rem;font-weight:600;padding:8px 13px;
  min-height:40px;min-width:52px;border-radius:12px;white-space:nowrap;transition:all .2s}
.btn-translate:hover,.btn-translate.open{color:var(--g3);border-color:rgba(255,80,0,.45);background:rgba(204,0,0,.1)}
.lang-dropdown{position:absolute;top:calc(100% + 8px);right:0;
  background:rgba(10,0,0,.98);border:1px solid var(--border2);border-radius:14px;overflow:hidden;min-width:148px;
  box-shadow:0 20px 60px rgba(0,0,0,.8);opacity:0;pointer-events:none;
  transform:translateY(-8px) scale(.96);transition:all .22s cubic-bezier(.22,1,.36,1);z-index:400}
.lang-wrap.open .lang-dropdown{opacity:1;pointer-events:all;transform:none}
.lang-opt{display:flex;align-items:center;gap:10px;padding:12px 16px;font-size:.87rem;font-weight:600;
  border-bottom:1px solid rgba(255,80,80,.08);transition:background .15s}
.lang-opt:last-child{border-bottom:none}
.lang-opt:hover,.lang-opt:active{background:rgba(204,0,0,.2);color:var(--cw)}
.lang-opt.active{color:var(--g3);background:rgba(204,0,0,.12)}
.lang-flag{font-size:1.1rem}

.nav-row2{border-top:1px solid var(--border);overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.nav-row2::-webkit-scrollbar{display:none}
.tab-nav{display:flex;gap:4px;padding:6px 14px;min-width:max-content}
.tab-btn{display:inline-flex;align-items:center;gap:7px;padding:8px 16px;min-height:40px;border-radius:10px;
  font-family:var(--font-b);font-size:.87rem;font-weight:600;border:1px solid transparent;
  background:transparent;color:var(--cm);transition:all .22s;white-space:nowrap;position:relative;overflow:hidden}
.tab-btn:hover,.tab-btn:active{color:var(--cw);background:var(--glass2);border-color:var(--border2)}
.tab-btn.active{background:linear-gradient(135deg,var(--g4),var(--g1),var(--g2));color:#fff;font-weight:700;
  border-color:transparent;box-shadow:0 0 24px rgba(200,0,0,.55),0 0 48px rgba(180,0,0,.2)}

.music-bar{display:none;align-items:center;gap:12px;flex-wrap:wrap;
  background:linear-gradient(90deg,rgba(180,0,0,.12),rgba(255,80,0,.06));
  border-bottom:1px solid rgba(180,0,0,.2);padding:7px 20px;font-size:.77rem}
.music-bar.show{display:flex;animation:slideDown .3s ease}
@keyframes slideDown{from{transform:translateY(-6px);opacity:0}to{transform:none;opacity:1}}
#music-name{background:linear-gradient(90deg,var(--g2),var(--g3));
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;font-weight:700}
.music-btn{background:var(--glass);border:1px solid var(--border2);color:var(--cm);
  padding:5px 13px;min-height:34px;border-radius:99px;font-size:.74rem;transition:all .2s}
.music-btn:hover,.music-btn:active{color:var(--cw);border-color:rgba(255,80,0,.35)}
.m-eq{display:flex;gap:3px;align-items:flex-end;height:16px}
.m-bar{width:3px;border-radius:2px;background:linear-gradient(to top,#440000,#aa0000,#ff2200,#ff7700);
  animation:eqB .55s ease-in-out infinite alternate;transform-origin:bottom}
.m-bar:nth-child(1){height:5px}.m-bar:nth-child(2){height:11px;animation-delay:.12s}
.m-bar:nth-child(3){height:16px;animation-delay:.24s}.m-bar:nth-child(4){height:8px;animation-delay:.06s}
.m-bar:nth-child(5){height:13px;animation-delay:.18s}
@keyframes eqB{from{transform:scaleY(.2)}to{transform:scaleY(1)}}
.music-bar.paused .m-bar{animation-play-state:paused}

.page{display:none}
.page.active{display:block;animation:pageIn .4s cubic-bezier(.22,1,.36,1) both}
@keyframes pageIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}

.hero{padding:90px 0 64px;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-100px;left:-100px;width:600px;height:600px;
  border-radius:50%;background:radial-gradient(circle,rgba(180,0,0,.25),transparent 65%);
  animation:hOrb1 14s ease-in-out infinite alternate;pointer-events:none}
.hero::after{content:'';position:absolute;bottom:-120px;right:-120px;width:550px;height:550px;
  border-radius:50%;background:radial-gradient(circle,rgba(255,50,0,.2),transparent 65%);
  animation:hOrb2 18s ease-in-out infinite alternate;pointer-events:none}
@keyframes hOrb1{from{transform:translate(0,0)}to{transform:translate(80px,60px) scale(1.2)}}
@keyframes hOrb2{from{transform:translate(0,0)}to{transform:translate(-60px,-40px) scale(1.15)}}
.hero-tag{display:inline-flex;align-items:center;gap:9px;font-size:.72rem;font-weight:600;
  letter-spacing:2.5px;text-transform:uppercase;color:var(--g3);
  border:1px solid rgba(255,102,0,.25);background:rgba(255,102,0,.06);
  padding:8px 20px;border-radius:99px;margin-bottom:30px;position:relative;overflow:hidden}
.hero-tag::before{content:'';position:absolute;top:0;left:-100%;width:50%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,102,0,.3),transparent);
  animation:tagShimmer 2.5s infinite}
@keyframes tagShimmer{from{left:-100%}to{left:200%}}
.hero-tag::after{content:'✦';animation:spin 8s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.hero h1{font-family:var(--font-d);font-size:clamp(2.4rem,7vw,5.4rem);font-weight:800;
  line-height:1.07;letter-spacing:-2px;margin-bottom:22px;
  animation:heroReveal .85s cubic-bezier(.22,1,.36,1) both .1s}
@keyframes heroReveal{from{opacity:0;transform:translateY(32px)}to{opacity:1;transform:none}}
.hero h1 em{font-style:normal;
  background:linear-gradient(90deg,#ff6600,#cc0000,#ff0000,#ff8800,#cc0000);
  background-size:300% 100%;-webkit-background-clip:text;background-clip:text;
  -webkit-text-fill-color:transparent;animation:logoFire 3s linear infinite;
  filter:drop-shadow(0 0 20px rgba(255,60,0,.5))}
.hero p{font-size:1.05rem;color:var(--cm);max-width:540px;margin:0 auto 40px;line-height:1.9;
  animation:heroReveal .85s cubic-bezier(.22,1,.36,1) both .2s}
.hero-actions{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;
  animation:heroReveal .85s cubic-bezier(.22,1,.36,1) both .3s}

.btn{display:inline-flex;align-items:center;gap:10px;padding:13px 26px;min-height:46px;border-radius:var(--r);
  font-family:var(--font-b);font-size:.9rem;font-weight:700;text-decoration:none;border:none;
  position:relative;overflow:hidden;letter-spacing:.2px;transition:all .3s}
.btn-primary{background:linear-gradient(135deg,var(--g4),var(--g1),var(--g2));color:#fff;font-weight:800;
  animation:btnPulse 2.5s ease-in-out infinite}
@keyframes btnPulse{
  0%,100%{box-shadow:0 0 0 1px rgba(255,80,0,.4),0 0 30px rgba(200,0,0,.5),0 6px 20px rgba(0,0,0,.5)}
  50%{box-shadow:0 0 0 2px rgba(255,150,0,.6),0 0 60px rgba(220,20,0,.8),0 8px 24px rgba(0,0,0,.5)}
}
.btn-primary:hover{transform:translateY(-4px) scale(1.02);animation:none;
  box-shadow:0 0 0 2px rgba(255,120,0,.5),0 0 80px rgba(220,0,0,.8),0 16px 40px rgba(0,0,0,.6)}
.btn-ghost{background:var(--glass);color:var(--cw);border:1px solid var(--border2)}
.btn-ghost:hover,.btn-ghost:active{border-color:rgba(255,80,0,.45);color:var(--g3);transform:translateY(-3px)}

.creator-band{background:var(--glass);border:1px solid var(--border2);border-radius:var(--r2);
  padding:26px 28px;display:flex;flex-direction:column;gap:16px;margin-bottom:60px;
  position:relative;overflow:hidden;transition:transform .35s,box-shadow .35s}
.creator-band::before{content:'';position:absolute;inset:0;border-radius:inherit;pointer-events:none;
  background:linear-gradient(135deg,rgba(180,0,0,.08),rgba(255,80,0,.05),rgba(140,0,0,.05))}
.creator-band:hover{transform:translateY(-4px);box-shadow:0 28px 80px rgba(0,0,0,.5),0 0 0 1px rgba(200,0,0,.2)}
.creator-top{display:flex;align-items:center;gap:16px}
.creator-avatar{width:54px;height:54px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--g4),var(--g1),var(--g2));
  display:flex;align-items:center;justify-content:center;font-size:1.4rem;
  animation:avatarPulse 3s ease-in-out infinite}
@keyframes avatarPulse{
  0%,100%{box-shadow:0 0 0 3px rgba(204,0,0,.35),0 0 20px rgba(180,0,0,.3)}
  50%{box-shadow:0 0 0 5px rgba(255,80,0,.5),0 0 50px rgba(255,60,0,.55)}
}
.creator-info h3{font-family:var(--font-d);font-size:1.1rem;font-weight:700;margin-bottom:7px}
.creator-desc{font-size:.87rem;color:var(--cm);line-height:1.75}
.creator-badges{display:flex;flex-wrap:wrap;gap:7px;margin-top:5px}
.cbadge{font-size:.7rem;padding:5px 12px;min-height:30px;border-radius:99px;font-weight:700;
  border:1px solid;display:inline-flex;align-items:center;gap:5px;
  text-decoration:none;transition:transform .2s,box-shadow .2s}
.cbadge-yt{color:#ff5050;border-color:rgba(255,60,60,.35);background:rgba(255,40,40,.1)}
.cbadge-dc{color:#ff9999;border-color:rgba(204,100,100,.3);background:rgba(204,100,100,.08)}
.cbadge-cr{color:var(--g3);border-color:rgba(255,102,0,.25);background:rgba(255,80,0,.08)}
.cbadge:hover,.cbadge:active{transform:scale(1.07)}

.stats{display:flex;gap:3px;flex-wrap:wrap;justify-content:center;margin-bottom:64px}
.stat-card{flex:1;min-width:120px;background:var(--glass);border:1px solid var(--border2);
  padding:26px 16px;text-align:center;border-radius:5px;
  transition:all .35s cubic-bezier(.22,1,.36,1);position:relative;overflow:hidden}
.stat-card:first-child{border-radius:16px 5px 5px 16px}
.stat-card:last-child{border-radius:5px 16px 16px 5px}
.stat-card::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--g4),var(--g1),var(--g2));
  transform:scaleX(0);transform-origin:left;transition:transform .4s}
.stat-card:hover{transform:translateY(-7px);border-color:rgba(255,80,0,.25)}
.stat-card:hover::after{transform:scaleX(1)}
.stat-num{font-family:var(--font-d);font-size:2rem;font-weight:800;
  background:linear-gradient(90deg,#ff6600,#cc0000,#ff2200,#ff8800,#cc0000);
  background-size:300% 100%;-webkit-background-clip:text;background-clip:text;
  -webkit-text-fill-color:transparent;display:block;
  filter:drop-shadow(0 0 12px rgba(220,0,0,.4));animation:logoFire 4s linear infinite}
.stat-label{font-size:.71rem;color:var(--cd);margin-top:4px;letter-spacing:1px;text-transform:uppercase}

.section-title{font-family:var(--font-d);font-size:clamp(1.7rem,3.5vw,2.4rem);
  font-weight:800;letter-spacing:-1px;margin-bottom:8px;
  background:linear-gradient(90deg,#ffffff,#ffbbbb,#ff4400,#cc0000,#ff4400,#ffbbbb,#ffffff);
  background-size:400% 100%;-webkit-background-clip:text;background-clip:text;
  -webkit-text-fill-color:transparent;animation:logoFire 5s linear infinite}
.section-sub{color:var(--cm);margin-bottom:30px;line-height:1.75;font-size:.95rem}
.features-section{padding:52px 0}.social-section{padding:52px 0 80px}
.divider{border:none;height:1px;background:linear-gradient(90deg,transparent,var(--border2),transparent);margin:16px 0}

.features-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px}
.feat-card{background:var(--glass);border:1px solid var(--border2);border-radius:var(--r2);
  padding:26px 24px;transition:all .35s cubic-bezier(.22,1,.36,1);position:relative;overflow:hidden}
.feat-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--g4),var(--g1),var(--g2));
  transform:scaleX(0);transform-origin:left;transition:transform .4s}
.feat-card:hover{transform:translateY(-8px);border-color:rgba(180,0,0,.3);box-shadow:0 24px 60px rgba(0,0,0,.5)}
.feat-card:hover::after{transform:scaleX(1)}
.feat-icon{font-size:2rem;margin-bottom:12px;display:block;transition:transform .35s}
.feat-card:hover .feat-icon{transform:scale(1.18) rotate(-8deg)}
.feat-card h3{font-family:var(--font-d);font-size:1.05rem;font-weight:700;margin-bottom:8px}
.feat-card p{font-size:.85rem;color:var(--cm);line-height:1.7}

.discord-banner{background:linear-gradient(135deg,rgba(180,0,0,.1),rgba(140,0,0,.08),rgba(255,80,0,.05));
  border:1px solid rgba(180,0,0,.22);border-radius:var(--r2);
  padding:44px 40px;display:flex;align-items:center;gap:32px;flex-wrap:wrap;
  position:relative;overflow:hidden;margin-bottom:20px;transition:transform .4s}
.discord-banner:hover{transform:translateY(-5px)}
.discord-banner::before{content:'';position:absolute;top:-120px;right:-120px;width:440px;height:440px;
  background:radial-gradient(circle,rgba(180,0,0,.25),transparent 70%);
  animation:orbDrift 16s ease-in-out infinite alternate;pointer-events:none}
@keyframes orbDrift{from{transform:translate(0,0)}to{transform:translate(50px,40px) scale(1.1)}}
.discord-content{flex:1;min-width:180px;position:relative;z-index:1}
.discord-content h2{font-family:var(--font-d);font-size:1.8rem;letter-spacing:-1px;margin-bottom:12px}
.discord-content p{color:var(--cm);line-height:1.8;margin-bottom:18px;font-size:.93rem}
.discord-perks{display:flex;flex-wrap:wrap;gap:9px;margin-bottom:24px}
.perk{display:inline-flex;align-items:center;gap:7px;font-size:.8rem;color:var(--cw);
  background:var(--glass);border:1px solid var(--border2);padding:5px 13px;border-radius:99px;transition:all .2s}
.perk:hover,.perk:active{background:var(--glass2);transform:scale(1.04)}
.btn-discord{display:inline-flex;align-items:center;gap:10px;
  background:linear-gradient(135deg,#cc0000,#991100);color:#fff;
  font-size:.9rem;font-weight:700;padding:12px 24px;border-radius:14px;
  text-decoration:none;transition:all .3s;box-shadow:0 0 30px rgba(180,0,0,.35)}
.btn-discord:hover,.btn-discord:active{transform:translateY(-4px);box-shadow:0 12px 44px rgba(180,0,0,.6)}
.yt-banner{background:var(--glass);border:1px solid var(--border2);border-radius:var(--r2);
  padding:28px 32px;display:flex;align-items:center;gap:24px;flex-wrap:wrap;
  transition:all .35s;position:relative;overflow:hidden}
.yt-banner:hover{transform:translateY(-4px);box-shadow:0 20px 50px rgba(0,0,0,.45)}
.yt-content{flex:1;min-width:180px}
.yt-content h3{font-family:var(--font-d);font-size:1.2rem;margin-bottom:7px}
.yt-content p{color:var(--cm);font-size:.87rem;line-height:1.7}
.btn-yt{display:inline-flex;align-items:center;gap:9px;
  background:linear-gradient(135deg,#cc0000,#881100);color:#fff;
  font-size:.88rem;font-weight:700;padding:11px 22px;border-radius:12px;
  text-decoration:none;flex-shrink:0;transition:all .3s;box-shadow:0 0 24px rgba(180,0,0,.22)}
.btn-yt:hover,.btn-yt:active{transform:translateY(-3px);box-shadow:0 12px 36px rgba(180,0,0,.5)}

.dl-page-hero{padding:64px 0 44px;text-align:center;position:relative}

#splash{
  position:fixed;inset:0;z-index:9999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;
  background:#060000;
  transition:opacity .8s ease, transform .8s ease;
  cursor:pointer;
  padding:24px;
  box-sizing:border-box;
  overflow:hidden;
}
#splash.hide{
  opacity:0;transform:scale(1.04);pointer-events:none;
}
.splash-bg{
  position:absolute;inset:0;overflow:hidden;pointer-events:none;
}
.splash-bg::before{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(ellipse 70% 60% at 20% 20%, rgba(180,0,0,.5), transparent 60%),
    radial-gradient(ellipse 60% 50% at 80% 80%, rgba(255,60,0,.35), transparent 55%),
    radial-gradient(ellipse 50% 40% at 60% 10%, rgba(120,0,0,.3), transparent 60%);
  animation:splashBg 4s ease-in-out infinite alternate;
}
@keyframes splashBg{
  0%{opacity:.7;filter:hue-rotate(0deg)}
  100%{opacity:1;filter:hue-rotate(12deg)}
}
.splash-particles{
  position:absolute;inset:0;overflow:hidden;pointer-events:none;
}
.splash-logo-wrap{
  position:relative;z-index:1;text-align:center;
  width:100%;max-width:500px;
  margin:0 auto 40px auto;
  animation:splashLogoIn 1s cubic-bezier(.22,1,.36,1) both;
}
@keyframes splashLogoIn{
  from{opacity:0;transform:translateY(-40px) scale(.85)}
  to{opacity:1;transform:none}
}
.splash-logo{
  font-family:'Syne',sans-serif;
  font-size:clamp(1.8rem,5vw,3.2rem);
  font-weight:800;letter-spacing:-2px;
  background:linear-gradient(90deg,#ff0000,#ff4400,#ffaa00,#ff4400,#cc0000,#770000,#cc0000,#ff4400,#ffaa00,#ff0000);
  background-size:300% 100%;
  -webkit-background-clip:text;background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:logoFire 2.5s linear infinite, splashGlow 2s ease-in-out infinite alternate;
  display:block;line-height:1.1;
  word-break:break-word;
  max-width:100%;
}
@keyframes splashGlow{
  0%{filter:drop-shadow(0 0 12px rgba(200,0,0,.7)) drop-shadow(0 0 4px rgba(255,80,0,.5))}
  100%{filter:drop-shadow(0 0 30px rgba(230,0,0,1)) drop-shadow(0 0 12px rgba(255,130,0,.8)) drop-shadow(0 0 50px rgba(180,0,0,.4))}
}
.splash-sub{display:none}
.splash-btn-wrap{
  position:relative;z-index:1;
  display:flex;flex-direction:column;align-items:center;
  animation:splashBtnIn 1s cubic-bezier(.22,1,.36,1) both .35s;
}
@keyframes splashBtnIn{
  from{opacity:0;transform:translateY(30px)}
  to{opacity:1;transform:none}
}
.splash-btn{
  position:relative;overflow:hidden;
  background:linear-gradient(135deg,#880000,#cc0000,#ff2200);
  color:#fff;font-family:'Syne',sans-serif;
  font-size:clamp(1rem,3vw,1.25rem);font-weight:800;
  letter-spacing:2px;text-transform:uppercase;
  padding:18px 56px;border-radius:999px;border:none;
  cursor:pointer;
  box-shadow:0 0 0 1px rgba(255,80,0,.4), 0 0 40px rgba(200,0,0,.6), 0 8px 30px rgba(0,0,0,.6);
  animation:splashBtnPulse 2s ease-in-out infinite;
  transition:transform .2s, box-shadow .2s;
  -webkit-tap-highlight-color:transparent;
}
@keyframes splashBtnPulse{
  0%,100%{box-shadow:0 0 0 1px rgba(255,80,0,.4),0 0 40px rgba(200,0,0,.5),0 8px 30px rgba(0,0,0,.6)}
  50%{box-shadow:0 0 0 2px rgba(255,140,0,.6),0 0 80px rgba(220,20,0,.9),0 8px 30px rgba(0,0,0,.6)}
}
.splash-btn::before{
  content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.25),transparent);
  animation:splashShimmer 2.2s infinite;
}
@keyframes splashShimmer{from{left:-100%}to{left:160%}}
.splash-btn:hover{transform:scale(1.06);box-shadow:0 0 0 2px rgba(255,140,0,.6),0 0 100px rgba(220,0,0,1),0 12px 40px rgba(0,0,0,.7);animation:none}
.splash-btn:active{transform:scale(.97)}
.splash-hint{display:none}

.splash-line{
  position:absolute;bottom:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,#300000,#880000,#cc0000,#ff2200,#ff6600,#ffaa00,#ff6600,#ff2200,#cc0000,#880000,#300000);
  background-size:300% 100%;animation:fireFlow 2s linear infinite;
}
@media (prefers-reduced-motion: reduce) {
  #nw-bg { animation: none; }
  nav::before { animation: none; background-position: 0% 0; }
  .logo { animation: none; }
  .hero h1 em { animation: none; }
  .hero::before, .hero::after { animation: none; }
  .hero-tag::before { animation: none; }
  .hero-tag::after { animation: none; }
  .btn-primary { animation: none; }
  .m-bar { animation: none; }
  .page.active { animation: none; }
  .hero h1, .hero p, .hero-actions { animation: none; }
  .dl-page-hero h1 em { animation: none; }
}
</style>

function t(key){
  if(!_cfg||!_cfg.ui)return key;
  const u=_cfg.ui;
  const suffix=currentLang!=='pt'?('_'+currentLang):'';
  if(suffix&&u[key+suffix]) return u[key+suffix];
  return u[key]||key;
}


async function loadConfig(){
  const paths=['config.txt','./config.txt'];
  for(const path of paths){
    try{
      const r=await fetch(path+'?t='+Date.now(),{cache:'no-store'});
      if(r.ok){
        const text=await r.text();
        if(text.trim()) return text;
      }
    }catch(e){}
  }
  return null;
}
function parseConfig(raw){
  const cfg={site:{},ui:{},musicas:{},sfx:{},badges:{},paginas:{},categorias:{},itens:{},abas:{},missoes:{}};
  let section=null,sType=null,sKey=null;
  for(let line of raw.split('\n')){
    line=line.trim();
    if(!line||line.startsWith('#')) continue;
    const sec=line.match(/^\[([^\]]+)\]$/);
    if(sec){
      const p=sec[1].split(':');
      sType=p[0];
      if(sType==='site'){section=cfg.site;}
      else if(sType==='ui'){section=cfg.ui;}
      else if(sType==='musicas'){section=cfg.musicas;}
      else if(sType==='sfx'){section=cfg.sfx;}
      else if(sType==='badge'){sKey=p[1];cfg.badges[sKey]={};section=cfg.badges[sKey];}
      else if(sType==='pagina'){sKey=p[1];cfg.paginas[sKey]={};section=cfg.paginas[sKey];}
      else if(sType==='categoria'){
        const pg=p[1],cat=p[2];
        if(!cfg.categorias[pg])cfg.categorias[pg]={};
        cfg.categorias[pg][cat]={};section=cfg.categorias[pg][cat];
      }
      else if(sType==='item'){sKey=p[1];cfg.itens[sKey]={};section=cfg.itens[sKey];}
      else if(sType==='aba'){sKey=p[1];cfg.abas[sKey]={blocos:[]};section=cfg.abas[sKey];}
      else if(sType==='bloco'){const abaKey=p[1];if(!cfg.abas[abaKey])cfg.abas[abaKey]={blocos:[]};const blk={};cfg.abas[abaKey].blocos.push(blk);section=blk;}
      else if(sType==='missao'){sKey=p.slice(1).join(':');cfg.missoes[sKey]={tarefas:[]};section=cfg.missoes[sKey];}
      else if(sType==='tarefa'){const mk=p.slice(1).join(':');if(!cfg.missoes[mk])cfg.missoes[mk]={tarefas:[]};const t={};cfg.missoes[mk].tarefas.push(t);section=t;}
      else section=null;
      continue;
    }
    const kv=line.match(/^([^=]+)=(.*)$/);
    if(kv&&section) section[kv[1].trim()]=kv[2].trim();
  }
  return cfg;
}

function hexToRgba(hex,a){
  hex=hex.replace('#','');
  if(hex.length===3)hex=hex.split('').map(c=>c+c).join('');
  return `rgba(${parseInt(hex.slice(0,2),16)},${parseInt(hex.slice(2,4),16)},${parseInt(hex.slice(4,6),16)},${a})`;
}
function badgeStyle(b){
  const c=b.cor_texto||'#fff';
  let style=`color:${c};background:${hexToRgba(b.cor_fundo||c,.12)};border:1px solid ${hexToRgba(b.cor_borda||c,.3)}`;
  if(b.cor_contorno){
    const o=b.cor_contorno;
    style+=`;-webkit-text-stroke:1.5px ${o};paint-order:stroke fill`;
  }
  return style;
}
function isUrl(s){ return s&&(s.startsWith('http')||s.startsWith('/')||/\.(png|jpg|gif|webp|svg)/.test(s)); }

        <a href="${s.youtube_url||'#'}" target="_blank" class="btn-yt">${SVG_YT.replace('15','14').replace('15','14')} ${t('ui_inscrever_yt')}</a>

    </section>
  </div></div>`;

function buildDownloads(cfg, abaKey){
  abaKey = abaKey||'downloads';
  const allDlAbas=Object.entries(cfg.abas).filter(([,a])=>a.tipo_fixo==='downloads').map(([k])=>k);
  const isFirstDlAba=allDlAbas[0]===abaKey;
  let sections='';
  for(const pgKey of Object.keys(cfg.paginas)){
    const pg=cfg.paginas[pgKey];
    const pgAba=pg.aba||'';
    if(pgAba && pgAba!==abaKey) continue;
    if(!pgAba && !isFirstDlAba) continue;
    const cats=cfg.categorias[pgKey]||{};
    const catKeys=Object.keys(cats);
    const pgItens=Object.entries(cfg.itens).filter(([,v])=>v.pagina===pgKey);
    const subTabsKey=`${abaKey}-${pgKey}`;
    const subTabs=catKeys.length?`
      <div class="sub-tabs" id="tabs-${subTabsKey}">
        <button class="sub-tab active" onclick="filterCat(this,'${subTabsKey}','all')">${t('ui_todos')}</button>
        ${catKeys.map(ck=>`<button class="sub-tab" onclick="filterCat(this,'${subTabsKey}','${ck}')">${cf(cats[ck],'nome')||ck}</button>`).join('')}
      </div>`:'';
    const grad=pg.cor_icone?`background:linear-gradient(135deg,${pg.cor_icone})`:'background:var(--surface2)';
    const iconHtml=isUrl(pg.icone)?`<img src="${pg.icone}"/>`:(pg.icone||'📁');
    const itemLabel=t('ui_item');
    const itemsLabel=t('ui_itens');
    const secId=`section-${abaKey}-${pgKey}`;
    const gridId=`grid-${abaKey}-${pgKey}`;
    const tabsId=`tabs-${abaKey}-${pgKey}`;
    const countId=`count-${abaKey}-${pgKey}`;
    sections+=`
    <div class="game-section" id="${secId}">
      <div class="game-header">
        <div class="game-icon" style="${grad}">${iconHtml}</div>
        <div class="game-header-info">
          <h2>${cf(pg,'nome')||pgKey}</h2>
          <p>${cf(pg,'descricao')}</p>
        </div>
        <span class="game-count" id="${countId}">${pgItens.length} ${pgItens.length===1?itemLabel:itemsLabel}</span>
      </div>
      ${subTabs.replace(/id="tabs-\${pgKey}"/,`id="${tabsId}"`).replace(/filterCat\(this,'\${pgKey}'/g,`filterCat(this,'${abaKey}-${pgKey}'`)}
      <div class="downloads-grid" id="${gridId}">
        ${pgItens.map(([k,v])=>buildCard(k,v,pgKey,cats,cfg.badges,cfg)).join('')}
      </div>
    </div>`;
  }
  return `<div id="page-downloads" class="page"><div class="wrapper">
    <section class="dl-page-hero">
      <div class="hero-tag">Netuke.Workshop</div>
      <h1>${t('ui_todos')} <em>Downloads</em></h1>
      <p>${t('ui_dl_hero_sub')}</p>
    </section>
    <div class="search-info" id="search-info-${abaKey}" style="display:none;text-align:center;margin-bottom:28px;color:var(--muted);font-size:.88rem">
      ${t('ui_resultados_para')+':'} <strong id="search-term-${abaKey}"></strong>
      <button class="clear-btn" onclick="clearSearch('${abaKey}')">✕ ${t('ui_limpar')}</button>
    </div>
    <div class="no-results" id="no-results-${abaKey}">
      <h3>${t('ui_sem_resultados')}</h3>
      <p>${t('ui_tente_outro_termo')}</p>
    </div>
    ${sections}
    <div style="text-align:center;padding:28px 0 66px">
      <p style="color:var(--muted);margin-bottom:12px;font-size:.87rem">${t('ui_discord_cta')}</p>
      <a href="${cfg.site.discord_url||'#'}" target="_blank" class="btn-discord">${SVG_DC(15)} ${t('ui_entrar_servidor')}</a>
    </div>
  </div></div>`;
}

function buildCard(key,item,pgKey,cats,badges,cfg){
  cfg=cfg||_cfg||{};
  let badgeHtml='';
  if(item.badge){
    const badgeList=item.badge.split('|').map(b=>b.trim()).filter(Boolean);
    const spans=badgeList.map(bKey=>{
      const b=badges[bKey];
      if(!b) return '';
      const bTexto=cf(b,'texto')||bKey;
      return `<span class="dl-badge" style="${badgeStyle(b)}">${bTexto}</span>`;
    }).join('');
    if(spans) badgeHtml=`<div class="dl-badges">${spans}</div>`;
  }
  let engTag='';
  if(item.categoria&&cats[item.categoria])
    engTag=`<span class="dl-engine-tag">${cf(cats[item.categoria],'nome')||item.categoria}</span>`;
  const tStyle=item.cor_fundo?`background:linear-gradient(135deg,${item.cor_fundo})`:'background:var(--surface2)';
  const tContent=isUrl(item.icone)
    ?`<img src="${item.icone}" alt="" style="width:100%;height:100%;object-fit:cover;position:absolute;inset:0"/>`
    :`<span class="thumb-emoji">${item.icone||'📁'}</span>`;
  const _pg=cfg.paginas&&cfg.paginas[pgKey];
  const _pgNome=(cf(_pg||{},'nome')||pgKey).toUpperCase();
  const catLabel=item.categoria&&cats[item.categoria]
    ?`${_pgNome} · ${cf(cats[item.categoria],'nome')||item.categoria}`
    :_pgNome;
  let criadorIconHtml='';
  if(item.criador){
    const ci=item.criador_icone||'yt';
    if(ci==='yt')
      criadorIconHtml=SVG_YT.replace('width="15" height="15"','width="30" height="30"').replace('fill="currentColor"','fill="#ff4444"');
    else if(ci==='dc')
      criadorIconHtml=SVG_DC(30);
    else if(ci==='nenhum'||ci==='none')
      criadorIconHtml='';
    else if(isUrl(ci))
      criadorIconHtml=`<img src="${ci}" style="width:30px;height:30px;border-radius:50%;object-fit:cover;flex-shrink:0"/>`;
    else
      criadorIconHtml=`<span style="font-size:10px;line-height:1">${ci}</span>`;
  }
  const criadorHtml=item.criador
  ?`<div class="dl-credit" style="display:flex;align-items:center;gap:8px;">${criadorIconHtml}<span style="color:var(--cm)">${t('ui_feito_por')}</span> <span>${item.criador}</span></div>`
  :'';

  let downloadHtml='';
  if(item.versoes){
    const vers=item.versoes.split('|').map(v=>v.trim()).filter(Boolean);
    const btns=vers.map(v=>{
      const sepIdx=v.indexOf('>>');
      let label,href;
      if(sepIdx>0){ label=v.slice(0,sepIdx).trim(); href=v.slice(sepIdx+2).trim()||'#'; }
      else { label=v; href='#'; }
      const target=href!=='#'?' target="_blank"':'';
      const missaoKeyVer=`${key}:${label}`;
      const hasMissaoVer=_cfg&&_cfg.missoes&&(_cfg.missoes[missaoKeyVer]||_cfg.missoes[key]);
      const verMissaoKey=(_cfg&&_cfg.missoes&&_cfg.missoes[missaoKeyVer])?missaoKeyVer:key;
      const verClick=hasMissaoVer
        ? `onclick="event.preventDefault();openMission('${verMissaoKey}','${href}','${label}',_cfg)"`
        : target;
      return `<a href="${href}" ${verClick} class="dl-btn-ver">⬇ ${label}</a>`;
    }).join('');
    downloadHtml=`<div class="dl-versions">${btns}</div>`;
  } else {
    const href=item.link||'#';
    const missaoKeySingle=key;
    const hasMissao=_cfg&&_cfg.missoes&&_cfg.missoes[missaoKeySingle];
    const dlClick=hasMissao
      ? `onclick="event.preventDefault();openMission('${missaoKeySingle}','${href}','${cf(item,'titulo')||key}',_cfg)"`
      : (href!=='#'?'target="_blank"':'');
    if(href==='#'&&!hasMissao){
      downloadHtml=`<div class="dl-meta"><span class="dl-size">${cf(item,'tamanho')?'📦 '+cf(item,'tamanho'):''}</span><button class="dl-btn dl-btn-unavailable" disabled style="opacity:.5;cursor:not-allowed;filter:grayscale(.6)">🔒 ${t('ui_unavailable')}</button></div>`;
    } else {
      downloadHtml=`<div class="dl-meta"><span class="dl-size">${cf(item,'tamanho')?'📦 '+cf(item,'tamanho'):''}</span><a href="${href}" ${dlClick} class="dl-btn">⬇ ${t('ui_download')}</a></div>`;
    }
  }
  const tamanhoLabel=cf(item,'tamanho');
  const sizeUnderVersions=item.versoes&&tamanhoLabel?`<div class="dl-size" style="margin-top:6px">📦 ${tamanhoLabel}</div>`:'';

  return `<div class="dl-card" data-page="${pgKey}" data-cat="${item.categoria||''}" data-search="${(item.titulo+' '+item.descricao+' '+pgKey+' '+(item.categoria||'')).toLowerCase()}">
    <div class="dl-thumb" style="${tStyle}">${tContent}${badgeHtml}${engTag}</div>
    <div class="dl-body">
      <div class="dl-cat">${catLabel}</div>
      <h3>${cf(item,'titulo')||item.titulo||'Item'}</h3>
      <p>${cf(item,'descricao')||item.descricao||''}</p>
      ${downloadHtml}
      ${sizeUnderVersions}
      ${criadorHtml}
    </div>
  </div>`;
}

function buildAba(abaKey, aba){
  const blocos = (aba.blocos||[]).map(b=>{
    const tipo = b.tipo||'texto';
    const grad = b.cor_fundo ? `background:linear-gradient(135deg,${b.cor_fundo})` : 'background:var(--surface)';

    if(tipo==='hero'){
      const titulo = cf(b,'titulo')||'';
      const sub = cf(b,'subtitulo')||'';
      const desc = cf(b,'descricao')||'';
      const btnTxt = cf(b,'botao_texto')||'';
      const btnLink = b.botao_link||'#';
      const imgHtml = b.imagem ? `<img src="${b.imagem}" style="max-width:100%;border-radius:14px;margin-top:24px;border:1px solid var(--border)"/>` : '';
      return `<section style="padding:70px 0 50px;text-align:center">
        <div class="hero-tag">${cf(aba,'nome')||abaKey}</div>
        <h1 style="font-family:'Syne',sans-serif;font-size:clamp(2rem,5vw,3.5rem);font-weight:800;letter-spacing:-2px;margin:16px 0;line-height:1.1">${titulo}</h1>
        ${sub?`<p style="font-size:1.1rem;color:var(--accent2);font-weight:600;margin-bottom:12px">${sub}</p>`:''}
        ${desc?`<p style="color:var(--muted);font-size:1rem;max-width:560px;margin:0 auto 28px;line-height:1.8">${desc}</p>`:''}
        ${btnTxt?`<a href="${btnLink}" ${btnLink!=='#'?'target="_blank"':''} class="btn btn-primary">${btnTxt}</a>`:''}
        ${imgHtml}
      </section>`;
    }

    if(tipo==='cards'){
      const itens = (cf(b,'itens')||'').split('|').map(i=>i.trim()).filter(Boolean);
      const cardsHtml = itens.map(i=>{
        const p = i.split('::');
        const tit = p[0]||''; const desc = p[1]||''; const ico = p[2]||'📄';
        return `<div class="feat-card"><div class="feat-icon">${ico}</div><h3>${tit}</h3><p>${desc}</p></div>`;
      }).join('');
      return `<section style="padding:40px 0">
        ${cf(b,'titulo')?`<div class="section-title" style="margin-bottom:8px">${cf(b,'titulo')}</div>`:''}
        ${cf(b,'subtitulo')?`<p class="section-sub">${cf(b,'subtitulo')}</p>`:''}
        <div class="features-grid">${cardsHtml}</div>
      </section>`;
    }

    if(tipo==='banner'){
      const titulo = cf(b,'titulo')||'';
      const desc = cf(b,'descricao')||'';
      const btnTxt = cf(b,'botao_texto')||'';
      const btnLink = b.botao_link||'#';
      const imgHtml = b.imagem ? `<img src="${b.imagem}" style="width:80px;height:80px;object-fit:cover;border-radius:16px;flex-shrink:0"/>` : `<div style="font-size:3rem;flex-shrink:0">${b.icone||'📌'}</div>`;
      return `<div style="${grad};border:1px solid var(--border);border-radius:18px;padding:32px 28px;display:flex;align-items:center;gap:22px;flex-wrap:wrap;margin:20px 0">
        ${imgHtml}
        <div style="flex:1;min-width:0">
          ${titulo?`<h2 style="font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;margin-bottom:8px">${titulo}</h2>`:''}
          ${desc?`<p style="color:var(--muted);line-height:1.7;margin-bottom:${btnTxt?'16px':'0'}">${desc}</p>`:''}
          ${btnTxt?`<a href="${btnLink}" ${btnLink!=='#'?'target="_blank"':''} class="btn btn-primary">${btnTxt}</a>`:''}
        </div>
      </div>`;
    }

    if(tipo==='texto'){
      const titulo = cf(b,'titulo')||'';
      const desc = cf(b,'descricao')||'';
      return `<section style="padding:32px 0">
        ${titulo?`<div class="section-title" style="margin-bottom:10px">${titulo}</div>`:''}
        ${desc?`<p style="color:var(--muted);line-height:1.8;font-size:1rem;max-width:720px">${desc}</p>`:''}
      </section>`;
    }

    if(tipo==='divider'){
      return `<hr class="divider" style="margin:8px 0"/>`;
    }

    return '';
  }).join('');

  return `<div id="page-aba-${abaKey}" class="page"><div class="wrapper" style="padding-bottom:80px">${blocos}</div></div>`;
}

let currentMusic=null, musicPlaying=false;
let _audioUnlocked=false;
let _pendingSrc=null, _pendingName=null, _pendingSourceType=null, _pendingSourceKey=null;
let _currentMusicSource=null;
const audio=document.getElementById('bg-audio');
audio.loop=true;

function _fadeOutThenApply(src, name, sourceType, sourceKey){
  if(!currentMusic||audio.volume===0){_applyMusic(src,name,sourceType,sourceKey);return;}
  const step=0.04, interval=40;
  const fade=setInterval(()=>{
    if(audio.volume>step){audio.volume=Math.max(0,audio.volume-step);}
    else{
      clearInterval(fade);
      audio.volume=0;
      _applyMusic(src,name,sourceType,sourceKey);
      let fv=0;
      const fi=setInterval(()=>{fv=Math.min(1,fv+0.05);audio.volume=fv;if(fv>=1)clearInterval(fi);},40);
    }
  },interval);
}
function _applyMusic(src, name, sourceType, sourceKey){
  audio.volume=1;
  _currentMusicSource=sourceType?{type:sourceType,key:sourceKey}:null;
  currentMusic=src;
  audio.pause();
  audio.src=src;       
  _updateMusicName(name||src);
  document.getElementById('music-bar').classList.add('show');
  musicPlaying=false;
  _setPlayBtn(false);
  const p=audio.play();
  if(p&&p.then){
    p.then(()=>{
      musicPlaying=true;
      _audioUnlocked=true;
      _pendingSrc=null;
      _setPlayBtn(true);
    }).catch(()=>{
      musicPlaying=false;
      _setPlayBtn(false);
      _pendingSrc=src; _pendingName=name;
      _pendingSourceType=sourceType; _pendingSourceKey=sourceKey;
    });
  } else {
    musicPlaying=true;
    _audioUnlocked=true;
    _pendingSrc=null;
    _setPlayBtn(true);
  }
}

function playMusic(src, name, sourceType, sourceKey){
  if(!src){ silenceMusic(); return; }
  if(currentMusic===src && musicPlaying) return;
  _fadeOutThenApply(src, name, sourceType||null, sourceKey||null);
}

function _resumePending(){
  if(!_pendingSrc) return;
  const s=_pendingSrc, n=_pendingName, st=_pendingSourceType, sk=_pendingSourceKey;
  _pendingSrc=null;
  _applyMusic(s, n, st, sk);
}
document.addEventListener('touchstart', _resumePending, {passive:true, capture:true});
document.addEventListener('click',      _resumePending, {capture:true});

function silenceMusic(){
  audio.pause();
  currentMusic=null;
  musicPlaying=false;
  _pendingSrc=null;
  _currentMusicSource=null;
  _setPlayBtn(false);
  document.getElementById('music-bar').classList.remove('show');
}

function stopMusic(){
  audio.pause();
  audio.currentTime=0;
  musicPlaying=false;
  _pendingSrc=null;
  _setPlayBtn(false);
}

function toggleMusic(){
  if(musicPlaying){
    audio.pause(); musicPlaying=false; _setPlayBtn(false);
  } else if(currentMusic){
    audio.play().then(()=>{ musicPlaying=true; _audioUnlocked=true; _setPlayBtn(true); }).catch(()=>{});
  }
}

function _updateMusicName(name){
  document.getElementById('music-name').textContent=name||'';
}
function _retranslateMusicName(){
  if(!_currentMusicSource||!_cfg) return;
  const {type,key}=_currentMusicSource;
  if(type==='pagina'&&_cfg.paginas[key])
    _updateMusicName(cf(_cfg.paginas[key],'nome')||key);
  else if(type==='aba'&&_cfg.abas[key])
    _updateMusicName(cf(_cfg.abas[key],'nome')||key);
}
function _setPlayBtn(playing){
  const btn=document.getElementById('music-toggle');
  if(btn) btn.innerHTML=(playing?'⏸ ':'▶ ')+'<span id="music-play-label">'+(playing?t('ui_pause'):t('ui_play'))+'</span>';
}
function _updatePageMeta(){
  document.title=t('ui_page_title');
  document.getElementById('meta-desc')?.setAttribute('content',t('ui_meta_desc'));
  document.getElementById('meta-og-title')?.setAttribute('content',t('ui_og_title'));
  document.getElementById('meta-og-desc')?.setAttribute('content',t('ui_og_desc'));
}
function _updateMusicBarLang(){
  _setPlayBtn(musicPlaying);
  const stop=document.getElementById('music-stop-label');
  if(stop) stop.textContent=t('ui_stop');
  _retranslateMusicName();
}

function handleSearch(val){
  const q=val.trim().toLowerCase();
  if(!q){ clearSearchPage(); return; }
  if(!_cfg) return;

  const universal=isHomeActive()||_activePage==='search';

  if(universal){
    const dlAbas=Object.entries(_cfg.abas).filter(([,a])=>a.tipo_fixo==='downloads');
    if(!dlAbas.length) return;
    let totalFound=0;
    let groupsHtml='';
    dlAbas.forEach(([abaKey,aba])=>{
      const pgId='page-aba-'+abaKey;
      const cards=document.querySelectorAll('#'+pgId+' .dl-card');
      const matches=[];
      cards.forEach(card=>{
        const text=(card.dataset.search||'')+(card.querySelector('h3')?.textContent||'').toLowerCase();
        if(text.includes(q)) matches.push(card.outerHTML);
      });
      if(!matches.length) return;
      totalFound+=matches.length;
      const abaName=cf(aba,'nome')||abaKey;
      const abaIcon=aba.icone||'📂';
      const resLabel=currentLang==='en'?`result${matches.length!==1?'s':''}`:`resultado${matches.length!==1?'s':''}`;
      groupsHtml+=`
        <div class="search-group">
          <div class="search-group-title">
            <span style="font-size:14px">${abaIcon}</span> ${abaName}
            <span style="color:var(--muted);font-weight:400;font-size:.74rem;margin-left:4px">${matches.length} ${resLabel}</span>
          </div>
          <div class="downloads-grid">${matches.join('')}</div>
        </div>`;
    });
    const titulo=t('ui_search_results');
    const clearLabel=t('ui_limpar');
    const sub=totalFound>0
      ?`${totalFound} ${totalFound!==1?t('ui_resultados_plural'):t('ui_resultado_singular')} ${t('ui_resultados_para')}`+` "<strong>${val.trim()}</strong>" <button class="clear-btn" onclick="clearSearch();updateClearBtn()">✕ ${clearLabel}</button>`
      :`${t('ui_sem_resultados_para')} "<strong>${val.trim()}</strong>" <button class="clear-btn" onclick="clearSearch();updateClearBtn()">✕ ${clearLabel}</button>` ;
    const emptyHtml=totalFound===0?`<div class="search-empty"><h3>${t('ui_nada_encontrado')}</h3><p>${t('ui_tente_outro_termo')}</p></div>`:'';
    let pg=document.getElementById('page-search');
    if(!pg){pg=document.createElement('div');pg.id='page-search';document.getElementById('app').appendChild(pg);}
    pg.innerHTML=`<div class="wrapper"><div class="search-results-header"><h2>${titulo}</h2><p>${sub}</p></div>${groupsHtml}${emptyHtml}<div style="padding-bottom:60px"></div></div>`;
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    pg.classList.add('active');
    _activePage='search';
    window.scrollTo({top:0,behavior:'smooth'});
  } else {
    const abaKey=getActiveDlAbaKey();
    if(!abaKey) return;
    const dlPgId='page-aba-'+abaKey;
    if(!document.getElementById(dlPgId)?.classList.contains('active')){
      document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
      document.getElementById(dlPgId)?.classList.add('active');
      document.getElementById('tab-aba-'+abaKey)?.classList.add('active');
      _activePage='aba-'+abaKey;
    }
    let found=0;
    document.querySelectorAll('#'+dlPgId+' .dl-card').forEach(card=>{
      const m=(card.dataset.search||'').includes(q)||(card.querySelector('h3')?.textContent||'').toLowerCase().includes(q);
      card.classList.toggle('hidden',!m);
      if(m) found++;
    });
    document.querySelectorAll('#'+dlPgId+' .game-section').forEach(s=>{
      s.style.display=s.querySelectorAll('.dl-card:not(.hidden)').length>0?'':'none';
    });
    const si=document.getElementById('search-info-'+abaKey);
    const st=document.getElementById('search-term-'+abaKey);
    if(si) si.style.display='block';
    if(st) st.textContent=val.trim();
    document.getElementById('no-results-'+abaKey)?.classList.toggle('show',found===0);
  }
}

const SVG_HOME = `<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>`;
const SVG_DL   = `<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>`;

function buildNavTabs(cfg){
  const tabNav=document.getElementById('tab-nav');
  tabNav.innerHTML='';
  let first=true;
  for(const [abaKey,aba] of Object.entries(cfg.abas)){
    const tipo=aba.tipo_fixo||'';
    const icone=aba.icone||'📄';
    const nome=cf(aba,'nome')||abaKey;
    const btn=document.createElement('button');
    btn.className='tab-btn'+(first?' active':'');
    btn.id='tab-aba-'+abaKey;
    let iconHtml='';
    if(tipo==='home') iconHtml=SVG_HOME;
    else if(tipo==='downloads') iconHtml=SVG_DL;
    else if(isUrl(icone)) iconHtml=`<img src="${icone}" style="width:14px;height:14px;border-radius:3px;object-fit:cover"/>`;
    else iconHtml=`<span style="font-size:13px">${icone}</span>`;
    btn.innerHTML=iconHtml+' '+nome;
    btn.onclick=()=>showPage('aba-'+abaKey);
    tabNav.appendChild(btn);
    if(first){ _activePage='aba-'+abaKey; first=false; }
  }
}

function buildAllPages(cfg){
  let html='';
  let first=true;
  for(const [abaKey,aba] of Object.entries(cfg.abas)){
    const tipo=aba.tipo_fixo||'';
    let pageHtml='';
    if(tipo==='home') pageHtml=buildHome(cfg).replace('id="page-home"',`id="page-aba-${abaKey}"`);
    else if(tipo==='downloads') pageHtml=buildDownloads(cfg,abaKey).replace('id="page-downloads"',`id="page-aba-${abaKey}"`);
    else pageHtml=buildAba(abaKey,aba);
    if(first){ pageHtml=pageHtml.replace('class="page"','class="page active"'); first=false; }
    html+=pageHtml;
  }
  return html;
}

function setupMusicObservers(cfg){
  const dlKeys=Object.entries(cfg.abas).filter(([,a])=>a.tipo_fixo==='downloads').map(([k])=>k);
  if(!dlKeys.length) return;
  dlKeys.forEach(dlKey=>{
    const isFirstDlAba=dlKeys[0]===dlKey;
    const dlAba=cfg.abas[dlKey];
    const dlPageId='page-aba-'+dlKey;
    Object.entries(cfg.paginas).forEach(([pk,pg])=>{
      if(!pg.musica) return;
      const pgAba=pg.aba||'';
      if(pgAba && pgAba!==dlKey) return;
      if(!pgAba && !isFirstDlAba) return;
      const sec=document.getElementById('section-'+dlKey+'-'+pk);
      if(!sec) return;
      new IntersectionObserver(entries=>{
        if(!entries[0].isIntersecting) return;
        if(!document.getElementById(dlPageId)?.classList.contains('active')) return;
        if(dlAba?.musica) return;
        if(currentMusic===pg.musica && musicPlaying) return;
        playMusic(pg.musica, cf(pg,'nome')||pg.nome||pk, 'pagina', pk);
      },{threshold:0.15}).observe(sec);
    });
  });
}


let _missionState = {};
let _missionTarget = null;

function openMission(itemKey, href, label, cfg){
  const missao = cfg.missoes && cfg.missoes[itemKey];
  if(!missao) { window.open(href,'_blank'); return; }

  _missionTarget = { href, label };
  _missionState = {};

  const titulo = cf(missao,'titulo') || (t('ui_mission_title'));
  const desc   = cf(missao,'descricao') || (t('ui_mission_desc'));
  document.getElementById('mission-title').textContent = '🔒 ' + titulo;
  document.getElementById('mission-desc').textContent  = desc;

(function(){

    if(!_ac) _ac=new AC();
    try{ if(_ac.state==='suspended') _ac.resume(); }catch(e){}
    return _ac;
  }

  function unlock(){
    if(_ok) return;
    try{
      var c=getAC(), b=c.createBuffer(1,1,22050), s=c.createBufferSource();
      s.buffer=b; s.connect(c.destination); s.start(0);

    document.addEventListener(ev,unlock,{once:false,passive:true,capture:true});
  });

      g.gain.setValueAtTime(0,now);
      g.gain.linearRampToValueAtTime(vol||.08,now+(atk||.008));

      var r=p.r*(1+Math.sin(p.pulse)*.4);
      var gr=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,r*5);
      gr.addColorStop(0,'rgba('+p.col+','+p.o+')');
      gr.addColorStop(1,'rgba('+p.col+',0)');
      ctx.beginPath(); ctx.arc(p.x,p.y,r*5,0,Math.PI*2);
      ctx.fillStyle=gr; ctx.fill();
      ctx.beginPath(); ctx.arc(p.x,p.y,r,0,Math.PI*2);
      ctx.fillStyle='rgba('+p.col+','+(p.o*1.8)+')'; ctx.fill();
    });
  }
  requestAnimationFrame(draw);
})();

</script>
